<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panini Album Virtual 2026</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#f3f4f6; }
      #root { min-height: 100vh; }
      .loading { display:flex; align-items:center; justify-content:center; min-height:100vh; color:#374151; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"><div class="loading">Cargando aplicación…</div></div>
    <script type="module">
      const reactUrl = 'https://esm.sh/react@18.3.1';
      const reactDomUrl = 'https://esm.sh/react-dom@18.3.1/client';
      const firebaseAppUrl = 'https://esm.sh/firebase@10.12.2/app';
      const firebaseFirestoreUrl = 'https://esm.sh/firebase@10.12.2/firestore';

      const makeModuleUrl = (code) => URL.createObjectURL(new Blob([code], { type: 'text/javascript' }));

      const transpile = (source, filename) => Babel.transform(source, {
        filename,
        presets: ['react', 'typescript'],
        sourceType: 'module'
      }).code;

      const firebaseSrc = await fetch('./firebase.js').then((r) => r.text());
      const firebasePatched = firebaseSrc
        .replace(/from\s+['"]firebase\/app['"]/g, `from '${firebaseAppUrl}'`)
        .replace(/from\s+['"]firebase\/firestore['"]/g, `from '${firebaseFirestoreUrl}'`);
      const firebaseUrl = makeModuleUrl(firebasePatched);

      const playerNamesSrc = await fetch('./playerNames.js').then((r) => r.text());
      const playerNamesUrl = makeModuleUrl(playerNamesSrc);
      const teamThemesSrc = await fetch('./teamThemes.js').then((r) => r.text());
      const teamThemesUrl = makeModuleUrl(teamThemesSrc);

      const appSrc = await fetch('./panini_virtual_album_2026_app.jsx').then((r) => r.text());
      const appPatched = appSrc
        .replace(/from\s+['"]react['"]/g, `from '${reactUrl}'`)
        .replace(/from\s+['"]firebase\/firestore['"]/g, `from '${firebaseFirestoreUrl}'`)
        .replace(/from\s+['"]\.\/firebase['"]/g, `from '${firebaseUrl}'`)
        .replace(/from\s+['"]\.\/playerNames(?:\.js)?['"]/g, `from '${playerNamesUrl}'`)
        .replace(/from\s+['"]\.\/teamThemes(?:\.js)?['"]/g, `from '${teamThemesUrl}'`);
      const appUrl = makeModuleUrl(transpile(appPatched, 'panini_virtual_album_2026_app.jsx'));

      const [{ default: PaniniAlbum2026 }, { createRoot }, React] = await Promise.all([
        import(appUrl),
        import(reactDomUrl),
        import(reactUrl)
      ]);

      createRoot(document.getElementById('root')).render(React.createElement(PaniniAlbum2026));
    </script>
  </body>
</html>
